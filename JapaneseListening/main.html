<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日语听力</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <span style="font-size:20px;">👂</span>
        <h1 style="margin:0;">日語聽力練習</h1>
      </div>
      <div class="input-group">
          <input type="text" id="newSceneDescription" placeholder="输入新场景，例如：约朋友一起旅行">
          <button id="generateSceneBtn">生成内容</button>
      </div>
      <div class="level-tabs-bar">
        <button class="level-tab-btn active" id="tabBeginner">🌱 初级</button>
        <button class="level-tab-btn" id="tabIntermediate">🌿 中级</button>
        <button class="level-tab-btn" id="tabAdvanced">🌳 高级</button>
      </div>
    </header>

    <main>
        <!-- Left sidebar -->
        <aside id="beginnerListContainer" style="display:none;">
            <h3 id="ToggleBeginnerTitle">初级听力</h3>
            <ul id="beginnerList"></ul>
        </aside>
        <aside id="intermediateListContainer" style="display:none;">
            <h3 id="ToggleIntermediateTitle">中级听力</h3>
            <ul id="intermediateList"></ul>
        </aside>
        <aside id="advancedListContainer" style="display:none;">
            <h3 id="ToggleAdvancedTitle">高级听力</h3>
            <ul id="advancedList"></ul>
        </aside>

        <!-- Right content -->
        <section id="beginnerDetails" style="display:none;">
            <h3 id="beginnerTitle">初级听力</h3>
            <p id="beginnerDescription">简介</p>
            <div class="toggle-options" style="flex-direction:column;align-items:center;">
              <div class="checkbox-group">
                <label><input type="checkbox" id="toggleBeginnerJapanese" checked> 显示日文</label>
                <label><input type="checkbox" id="toggleBeginnerTranslation" checked> 显示翻译</label>
              </div>
              <div class="speech-rate-wrapper">
                <label for="speechRateBeginner">语速：</label>
                <input type="range" id="speechRateBeginner" min="0.5" max="1.5" step="0.1" value="1">
                <span id="speechRateValueBeginner">1.0</span>
              </div>
            </div>
            <div id="beginnerDialog"></div>
            <div id="beginnerTranslation"></div>
        </section>

        <section id="intermediateDetails" style="display:none;">
            <h3 id="intermediateTitle">中级听力</h3>
            <p id="intermediateDescription">简介</p>
            <div class="toggle-options" style="flex-direction:column;align-items:center;">
              <div class="checkbox-group">
                <label><input type="checkbox" id="toggleIntermediateJapanese" checked> 显示日文</label>
                <label><input type="checkbox" id="toggleIntermediateTranslation" checked> 显示翻译</label>
              </div>
              <div class="speech-rate-wrapper">
                <label for="speechRateIntermediate">语速：</label>
                <input type="range" id="speechRateIntermediate" min="0.5" max="1.5" step="0.1" value="1">
                <span id="speechRateValueIntermediate">1.0</span>
              </div>
            </div>
            <div id="intermediateDialog"></div>
            <div id="intermediateTranslation"></div>
        </section>

        <section id="advancedDetails" style="display:none;">
            <h3 id="advancedTitle">高级听力</h3>
            <p id="advancedDescription">简介</p>
            <div class="toggle-options" style="flex-direction:column;align-items:center;">
              <div class="checkbox-group">
                <label><input type="checkbox" id="toggleAdvancedJapanese" checked> 显示日文</label>
                <label><input type="checkbox" id="toggleAdvancedTranslation" checked> 显示翻译</label>
              </div>
              <div class="speech-rate-wrapper">
                <label for="speechRateAdvanced">语速：</label>
                <input type="range" id="speechRateAdvanced" min="0.5" max="1.5" step="0.1" value="1">
                <span id="speechRateValueAdvanced">1.0</span>
              </div>
            </div>
            <div id="advancedDialog"></div>
            <div id="advancedTranslation"></div>
        </section>
    </main>

    <script>
      // Tab buttons delegate to window.toggleMode (defined in render.js)
      // which renders the list and auto-selects the first item
      const LEVELS = ['beginner', 'intermediate', 'advanced'];

      function setActiveTab(level) {
        ['tabBeginner','tabIntermediate','tabAdvanced'].forEach((id, i) => {
          document.getElementById(id).classList.toggle('active', LEVELS[i] === level);
        });
      }

      function switchToLevel(level) {
        // window.toggleMode is defined in render.js and handles all rendering
        if (typeof window.toggleMode === 'function') {
          window.toggleMode(level);
        }
        setActiveTab(level);
      }

      document.getElementById('tabBeginner').addEventListener('click', () => switchToLevel('beginner'));
      document.getElementById('tabIntermediate').addEventListener('click', () => switchToLevel('intermediate'));
      document.getElementById('tabAdvanced').addEventListener('click', () => switchToLevel('advanced'));
    </script>

    <script src="static/js/utils.js"></script>
    <script src="static/js/audio.js"></script>
    <script src="static/js/render.js"></script>
    <script src="static/js/gpt.js"></script>
    <script src="static/js/app.js"></script>
</body>
</html>
