<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>日语课程</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <div class="header-top">
      <span style="font-size:20px;">📚</span>
      <h1>日語課程</h1>
    </div>
    <!-- Level Tab Bar -->
    <div class="level-tabs-bar">
      <button class="level-tab-btn active" id="tabBeginner">🌱 初级</button>
      <button class="level-tab-btn" id="tabIntermediate">🌿 中级</button>
      <button class="level-tab-btn" id="tabAdvanced">🌳 高级</button>
    </div>
  </header>

  <main>
    <!-- Left sidebar -->
    <aside>
      <h3 id="lessonLevelSwitcher" style="cursor:pointer;">课程列表</h3>

      <div id="beginnerListContainer" style="display:block;">
        <ul id="beginnerList"></ul>
      </div>
      <div id="intermediateListContainer" style="display:none;">
        <ul id="intermediateList"></ul>
      </div>
      <div id="advancedListContainer" style="display:none;">
        <ul id="advancedList"></ul>
      </div>
    </aside>

    <!-- Right content -->
    <section>
      <div id="beginnerDetails" style="display:block;">
        <div id="beginnerContent"></div>
      </div>
      <div id="intermediateDetails" style="display:none;">
        <div id="intermediateContent"></div>
      </div>
      <div id="advancedDetails" style="display:none;">
        <div id="advancedContent"></div>
      </div>
    </section>
  </main>

  <script>
    // Level tab switching
    const tabBeginner     = document.getElementById('tabBeginner');
    const tabIntermediate = document.getElementById('tabIntermediate');
    const tabAdvanced     = document.getElementById('tabAdvanced');

    const beginnerList    = document.getElementById('beginnerListContainer');
    const intermediateList= document.getElementById('intermediateListContainer');
    const advancedList    = document.getElementById('advancedListContainer');

    const beginnerDetails    = document.getElementById('beginnerDetails');
    const intermediateDetails= document.getElementById('intermediateDetails');
    const advancedDetails    = document.getElementById('advancedDetails');

    function showLevel(level) {
      [tabBeginner, tabIntermediate, tabAdvanced].forEach(t => t.classList.remove('active'));
      [beginnerList, intermediateList, advancedList].forEach(l => l.style.display = 'none');
      [beginnerDetails, intermediateDetails, advancedDetails].forEach(d => d.style.display = 'none');

      if (level === 'beginner') {
        tabBeginner.classList.add('active');
        beginnerList.style.display = 'block';
        beginnerDetails.style.display = 'block';
      } else if (level === 'intermediate') {
        tabIntermediate.classList.add('active');
        intermediateList.style.display = 'block';
        intermediateDetails.style.display = 'block';
      } else {
        tabAdvanced.classList.add('active');
        advancedList.style.display = 'block';
        advancedDetails.style.display = 'block';
      }
    }

    tabBeginner.addEventListener('click', () => showLevel('beginner'));
    tabIntermediate.addEventListener('click', () => showLevel('intermediate'));
    tabAdvanced.addEventListener('click', () => showLevel('advanced'));

    // Keep original lessonLevelSwitcher click cycling for backward compat with app.js
    let currentLevel = 'beginner';
    document.getElementById('lessonLevelSwitcher').addEventListener('click', () => {
      if (currentLevel === 'beginner') { currentLevel = 'intermediate'; showLevel('intermediate'); }
      else if (currentLevel === 'intermediate') { currentLevel = 'advanced'; showLevel('advanced'); }
      else { currentLevel = 'beginner'; showLevel('beginner'); }
    });
  </script>

  <script src="static/js/utils.js"></script>
  <script src="static/js/audio.js"></script>
  <script src="static/js/render.js"></script>
  <script src="static/js/app.js"></script>
</body>
</html>
