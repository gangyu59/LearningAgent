<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常学习</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <span style="font-size:20px;">🌸</span>
        <h1 style="margin:0;">日常學習</h1>
      </div>
      <div class="input-group">
          <input type="text" id="newSceneDescription" placeholder="输入新场景，例如：打电话预约球场">
          <button id="generateSceneBtn">生成对话</button>
      </div>
      <!-- Mode Tabs -->
      <div class="mode-tabs" id="modeTabs">
        <button class="mode-tab-btn" id="modeScene">场景</button>
        <button class="mode-tab-btn" id="modeWord">词汇</button>
        <button class="mode-tab-btn" id="modeStory">故事</button>
        <button class="mode-tab-btn" id="modeGrammar">语法</button>
      </div>
    </header>

    <main>
        <!-- Left sidebar containers -->
        <aside id="sceneListContainer" style="display: none;">
            <h3 id="ToggleTitle">常用场景</h3>
            <ul id="sceneList"></ul>
        </aside>

        <aside id="wordListContainer" style="display: none;">
            <h3 id="ToggleWordTitle">常用词汇</h3>
            <ul id="wordList"></ul>
        </aside>

        <aside id="storyListContainer" style="display: none;">
            <h3 id="ToggleStoryTitle">故事汇集</h3>
            <ul id="storyList"></ul>
        </aside>

        <aside id="grammarListContainer" style="display: none;">
            <h3 id="ToggleGrammarTitle">常用语法</h3>
            <ul id="grammarList"></ul>
        </aside>

        <!-- Right detail panels -->
        <section id="sceneDetails" style="display: none;">
            <h3 id="sceneTitle">对话</h3>
            <p id="sceneDescription">场景描述</p>
            <div class="toggle-options">
                <label><input type="checkbox" id="toggleRomaji" checked> 显示罗马音</label>
                <label><input type="checkbox" id="toggleTranslation" checked> 显示翻译</label>
            </div>
            <div id="sceneDialog"></div>
            <div id="sceneTranslation"></div>
        </section>

        <section id="wordDetails" style="display: none;">
            <h3 id="wordTitle">词类</h3>
            <p id="wordDescription">词汇描述</p>
            <div class="toggle-options">
                <label><input type="checkbox" id="toggleWordRomaji" checked> 显示罗马音</label>
                <label><input type="checkbox" id="toggleWordTranslation" checked> 显示翻译</label>
            </div>
            <div id="wordDialog"></div>
            <div id="wordTranslation"></div>
        </section>

        <section id="storyDetails" style="display: none;">
            <h3 id="storyTitle">故事标题</h3>
            <p id="storyDescription">故事简介</p>
            <div class="toggle-options">
                <label><input type="checkbox" id="toggleStoryRomaji" checked> 显示罗马音</label>
                <label><input type="checkbox" id="toggleStoryTranslation" checked> 显示翻译</label>
            </div>
            <div id="storyDialog"></div>
            <div id="storyTranslation"></div>
        </section>

        <section id="grammarDetails" style="display: none;">
            <h3 id="grammarTitle">语法点</h3>
            <p id="grammarDescription">语法说明</p>
            <div class="toggle-options">
                <label><input type="checkbox" id="toggleGrammarRomaji" checked> 显示罗马音</label>
                <label><input type="checkbox" id="toggleGrammarTranslation" checked> 显示翻译</label>
            </div>
            <div id="grammarDialog"></div>
            <div id="grammarTranslation"></div>
        </section>
    </main>

    <script>
      // Mode tab UI — works alongside app.js ToggleTitle click logic
      const modeBtns = {
        scene:   document.getElementById('modeScene'),
        word:    document.getElementById('modeWord'),
        story:   document.getElementById('modeStory'),
        grammar: document.getElementById('modeGrammar'),
      };

      const titles = {
        scene:   document.getElementById('ToggleTitle'),
        word:    document.getElementById('ToggleWordTitle'),
        story:   document.getElementById('ToggleStoryTitle'),
        grammar: document.getElementById('ToggleGrammarTitle'),
      };

      function setActiveMode(mode) {
        Object.keys(modeBtns).forEach(k => modeBtns[k].classList.remove('active'));
        modeBtns[mode].classList.add('active');
        // Trigger the app.js ToggleTitle click handler to switch the view
        titles[mode].click();
      }

      modeBtns.scene.addEventListener('click', () => setActiveMode('scene'));
      modeBtns.word.addEventListener('click', () => setActiveMode('word'));
      modeBtns.story.addEventListener('click', () => setActiveMode('story'));
      modeBtns.grammar.addEventListener('click', () => setActiveMode('grammar'));

      // Sync tab highlight when app.js switches mode via title clicks
      function syncModeTabs() {
        const sceneVisible = document.getElementById('sceneListContainer').style.display !== 'none';
        const wordVisible  = document.getElementById('wordListContainer').style.display !== 'none';
        const storyVisible = document.getElementById('storyListContainer').style.display !== 'none';
        const grammarVisible = document.getElementById('grammarListContainer').style.display !== 'none';
        Object.values(modeBtns).forEach(b => b.classList.remove('active'));
        if (sceneVisible)   modeBtns.scene.classList.add('active');
        else if (wordVisible)  modeBtns.word.classList.add('active');
        else if (storyVisible) modeBtns.story.classList.add('active');
        else if (grammarVisible) modeBtns.grammar.classList.add('active');
      }

      // Observe DOM changes to keep tabs in sync
      const observer = new MutationObserver(syncModeTabs);
      ['sceneListContainer','wordListContainer','storyListContainer','grammarListContainer'].forEach(id => {
        const el = document.getElementById(id);
        if (el) observer.observe(el, { attributes: true, attributeFilter: ['style'] });
      });
    </script>

    <script src="static/js/utils.js"></script>
    <script src="static/js/audio.js"></script>
    <script src="static/js/render.js"></script>
    <script src="static/js/gpt.js"></script>
    <script src="static/js/app.js"></script>
</body>
</html>
