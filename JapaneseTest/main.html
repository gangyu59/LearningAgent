<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>日语测试</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <div class="header-row">
      <span style="font-size:20px;">✏️</span>
      <h1>日語能力測試</h1>
    </div>
    <div class="header-actions">
      <button id="generateTestBtn">🎲 生成测试</button>
      <div id="hourglass">⏳ 正在生成…</div>
    </div>
    <div class="level-tabs-bar">
      <button class="level-tab-btn active" id="tabBeginner">🌱 初级</button>
      <button class="level-tab-btn" id="tabIntermediate">🌿 中级</button>
      <button class="level-tab-btn" id="tabAdvanced">🌳 高级</button>
    </div>
  </header>

  <main>
    <!-- Sidebar -->
    <aside>
      <h3 id="testLevelSwitcher" style="cursor:pointer;">测试列表</h3>

      <div id="beginnerListContainer" style="display:block;">
        <ul id="beginnerList"></ul>
      </div>
      <div id="intermediateListContainer" style="display:none;">
        <ul id="intermediateList"></ul>
      </div>
      <div id="advancedListContainer" style="display:none;">
        <ul id="advancedList"></ul>
      </div>
    </aside>

    <!-- Content -->
    <section>
      <div id="beginnerDetails" style="display:block;">
        <div class="content-title-row">
          <h3 id="beginnerTitle">初级测试</h3>
          <button id="deleteTestBtn">🗑 删除</button>
        </div>
        <div class="toggle-options">
          <label><input type="checkbox" id="toggleBeginnerJapanese" /> 显示答案</label>
          <label><input type="checkbox" id="toggleBeginnerTranslation" style="margin-left:16px;"/> 显示解释</label>
        </div>
        <div id="beginnerContent"></div>
      </div>

      <div id="intermediateDetails" style="display:none;">
        <div class="content-title-row">
          <h3 id="intermediateTitle">中级测试</h3>
          <button id="deleteTestBtn">🗑 删除</button>
        </div>
        <div class="toggle-options">
          <label><input type="checkbox" id="toggleIntermediateJapanese" /> 显示答案</label>
          <label><input type="checkbox" id="toggleIntermediateTranslation" /> 显示解释</label>
        </div>
        <div id="intermediateContent"></div>
      </div>

      <div id="advancedDetails" style="display:none;">
        <div class="content-title-row">
          <h3 id="advancedTitle">高级测试</h3>
          <button id="deleteTestBtn">🗑 删除</button>
        </div>
        <div class="toggle-options">
          <label><input type="checkbox" id="toggleAdvancedJapanese" /> 显示答案</label>
          <label><input type="checkbox" id="toggleAdvancedTranslation" /> 显示解释</label>
        </div>
        <div id="advancedContent"></div>
      </div>
    </section>
  </main>

  <script>
    // Level tab switching
    function showLevel(level) {
      ['Beginner','Intermediate','Advanced'].forEach(l => {
        document.getElementById('tab' + l).classList.remove('active');
        const lc = l.toLowerCase();
        const listEl = document.getElementById(lc + 'ListContainer');
        const detailEl = document.getElementById(lc + 'Details');
        if (listEl) listEl.style.display = 'none';
        if (detailEl) detailEl.style.display = 'none';
      });
      const cap = level.charAt(0).toUpperCase() + level.slice(1);
      document.getElementById('tab' + cap).classList.add('active');
      const listEl = document.getElementById(level + 'ListContainer');
      const detailEl = document.getElementById(level + 'Details');
      if (listEl) listEl.style.display = 'block';
      if (detailEl) detailEl.style.display = 'block';
    }

    document.getElementById('tabBeginner').addEventListener('click', () => showLevel('beginner'));
    document.getElementById('tabIntermediate').addEventListener('click', () => showLevel('intermediate'));
    document.getElementById('tabAdvanced').addEventListener('click', () => showLevel('advanced'));

    // Legacy switcher click cycle
    let currentLevel = 'beginner';
    document.getElementById('testLevelSwitcher').addEventListener('click', () => {
      if (currentLevel === 'beginner') { currentLevel = 'intermediate'; showLevel('intermediate'); }
      else if (currentLevel === 'intermediate') { currentLevel = 'advanced'; showLevel('advanced'); }
      else { currentLevel = 'beginner'; showLevel('beginner'); }
    });
  </script>

  <script src="static/js/utils.js"></script>
  <script src="static/js/ark.js"></script>
  <script src="static/js/audio.js"></script>
  <script src="static/js/render.js"></script>
  <script src="static/js/app.js"></script>
</body>
</html>
