<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>翻译</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <div class="page-header">
    <span style="font-size:20px;">🔄</span>
    <h1>翻譯助手</h1>
  </div>

  <!-- Form Card -->
  <div class="translator-card">
    <!-- Language selectors -->
    <div class="form-row">
      <label for="inputLang">输入语言：</label>
      <select id="inputLang">
        <option value="zh" selected>🇨🇳 中文</option>
        <option value="en">🇬🇧 英文</option>
        <option value="ja">🇯🇵 日文</option>
      </select>

      <span style="font-size:18px;color:#9999BB;">→</span>

      <label for="outputLang">输出语言：</label>
      <select id="outputLang">
        <option value="ja" selected>🇯🇵 日文</option>
        <option value="zh">🇨🇳 中文</option>
        <option value="en">🇬🇧 英文</option>
      </select>

      <label for="aiModel">AI：</label>
      <select id="aiModel">
        <option value="DEEPSEEK">DeepSeek</option>
        <option value="ARK">ARK</option>
      </select>
    </div>

    <!-- Text Input -->
    <div class="form-row">
      <textarea id="userInput" placeholder="请输入要翻译的内容…" style="flex:1;"></textarea>
    </div>

    <!-- Translate Button -->
    <div class="form-row" style="justify-content:center;">
      <button id="translateBtn">🔄&nbsp; 翻译</button>
    </div>
  </div>

  <!-- Output -->
  <div id="output"></div>

  <script src="scripts/config.js"></script>
  <script src="scripts/prompt.js"></script>
  <script src="scripts/aiService.js"></script>
  <script src="scripts/translator.js"></script>
  <script src="scripts/audio.js"></script>
  <script src="scripts/main.js"></script>
</body>
</html>
